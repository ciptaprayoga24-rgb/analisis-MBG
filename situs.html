<!DOCTYPE html>
<html lang="id" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yayasan Astagfirlaallh - Secure Enterprise Console</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            500: '#3b82f6', 
                            600: '#2563eb',
                            900: '#1e3a8a',
                            gold: '#fbbf24',
                            danger: '#ef4444'
                        }
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-panel {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .text-mono { font-family: 'JetBrains Mono', monospace; }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.6); }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
    </style>
</head>
<body class="h-full text-slate-100 antialiased bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black" x-data="yayasanApp()" x-init="initApp()">

    <!-- TOAST NOTIFICATION SYSTEM -->
    <div class="fixed top-6 right-6 z-50 space-y-3 pointer-events-none">
        <template x-for="toast in toasts" :key="toast.id">
            <div x-transition class="bg-slate-900/95 border-l-4 border-blue-500 text-white px-5 py-4 rounded-xl shadow-[0_10px_30px_rgba(0,0,0,0.5)] flex items-center space-x-3.5 backdrop-blur-md pointer-events-auto border border-slate-800">
                <i class="fa-solid fa-circle-info text-blue-400 text-lg"></i>
                <div>
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">SYSTEM ALERT LOG</p>
                    <p class="text-xs font-semibold text-slate-100" x-text="toast.message"></p>
                </div>
            </div>
        </template>
    </div>

    <!-- ================= MULTI-FACTOR SECURE AUTH SCREEN ================= -->
    <template x-if="!isLoggedIn">
        <div class="min-h-screen flex items-center justify-center px-4 bg-slate-950">
            <div class="max-w-md w-full space-y-6 glass-panel p-8 rounded-3xl border border-slate-800/80 shadow-[0_20px_50px_rgba(0,0,0,0.8)]">
                <div class="text-center">
                    <div class="mx-auto h-16 w-16 bg-gradient-to-tr from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center shadow-[0_0_30px_rgba(59,130,246,0.3)] mb-4">
                        <i class="fa-solid fa-shield-halved text-white text-3xl"></i>
                    </div>
                    <h2 class="text-2xl font-extrabold bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent tracking-tight">Otoritas Yayasan Astagfirlaallh</h2>
                    <p class="mt-1 text-[11px] text-brand-gold tracking-wide uppercase font-bold">Portal Kendali Pemagang & Auditor v7.3</p>
                </div>

                <!-- Lockout Banner -->
                <div x-show="lockoutTime > 0" class="bg-rose-950/40 border border-rose-900/50 p-4 rounded-2xl text-xs text-rose-300 space-y-1 text-center">
                    <p class="font-bold"><i class="fa-solid fa-ban mr-1.5 animate-spin"></i> BLOKIR KEAMANAN AKTIF</p>
                    <p>Terlalu banyak kegagalan. Tunggu <span class="font-mono font-bold text-sm text-white" x-text="lockoutTime"></span> detik.</p>
                </div>

                <!-- Credentials Info -->
                <div x-show="lockoutTime <= 0" class="bg-slate-900/80 p-4 rounded-2xl border border-slate-800/60 text-[10px] space-y-1 text-slate-400">
                    <p class="font-bold text-brand-gold mb-1"><i class="fa-solid fa-fingerprint mr-1"></i> Hak Akses Masuk:</p>
                    <p>• <strong>Super Admin</strong>: <span class="text-white font-mono">admin</span> / <span class="text-white font-mono">admin123</span></p>
                    <p>• <strong>Auditor Khusus</strong>: <span class="text-white font-mono">auditor</span> / <span class="text-white font-mono">auditor123</span></p>
                </div>

                <!-- STEP 1: Username & Password -->
                <div x-show="loginStep === 1 && lockoutTime <= 0">
                    <form class="space-y-4" @submit.prevent="submitPassword()">
                        <div>
                            <label class="block text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">ID Pekerja / Username</label>
                            <input type="text" x-model="loginForm.username" required class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 text-xs focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Kunci Sandi Enkripsi</label>
                            <input type="password" x-model="loginForm.password" required class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 text-xs focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all">
                        </div>
                        <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-extrabold py-3.5 px-4 rounded-xl transition-all shadow-lg text-xs uppercase tracking-widest hover:opacity-90">
                            Verifikasi Tahap Pertama
                        </button>
                    </form>
                </div>

                <!-- STEP 2: MFA Challenge -->
                <div x-show="loginStep === 2 && lockoutTime <= 0" class="space-y-4">
                    <div class="p-4 bg-blue-500/10 border border-blue-500/20 rounded-2xl text-xs text-blue-400 text-center">
                        <p class="font-bold"><i class="fa-solid fa-shield-halved mr-1"></i> OTENTIKASI DUA FAKTOR (2FA)</p>
                        <p class="mt-1 text-slate-400">Gunakan kode otentikasi darurat ini: <span class="font-mono text-white font-bold bg-slate-900 px-2 py-0.5 rounded" x-text="generatedOTP"></span></p>
                    </div>
                    <form class="space-y-4" @submit.prevent="submitOTP()">
                        <div>
                            <label class="block text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Masukkan OTP 6-Digit</label>
                            <input type="text" x-model="loginForm.otp" placeholder="000000" required class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-center text-slate-100 font-bold text-sm tracking-widest focus:border-blue-500 outline-none">
                        </div>
                        <div class="flex gap-2">
                            <button type="button" @click="loginStep = 1" class="w-1/3 bg-slate-900 border border-slate-800 text-slate-400 font-bold py-3.5 rounded-xl text-xs">Batal</button>
                            <button type="submit" class="w-2/3 bg-blue-600 hover:bg-blue-500 text-white font-black py-3.5 rounded-xl text-xs uppercase tracking-wider">Otorisasi Sesi</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </template>

    <!-- ================= MAIN PLATFORM WORKSPACE ================= -->
    <template x-if="isLoggedIn">
        <div class="flex h-screen overflow-hidden">

            <!-- SIDEBAR NAVIGATION -->
            <aside class="hidden lg:flex flex-col w-64 bg-slate-950 border-r border-slate-900/80 shrink-0">
                <div class="p-6 border-b border-slate-900 flex items-center space-x-3">
                    <div class="bg-gradient-to-tr from-blue-600 to-indigo-600 p-2.5 rounded-2xl text-white">
                        <i class="fa-solid fa-building-columns text-lg"></i>
                    </div>
                    <div>
                        <h1 class="text-xs font-black tracking-tight text-white">ASTAGFIRLAALLH</h1>
                        <p class="text-[8px] text-brand-gold font-bold uppercase tracking-widest">KONSOL CONTROL V7.3</p>
                    </div>
                </div>
                
                <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
                    <p class="text-[9px] font-bold text-slate-600 uppercase tracking-widest px-4 mb-2">MANAGEMENT CORE</p>
                    
                    <button @click="currentTab = 'dashboard'" :class="currentTab === 'dashboard' ? 'bg-gradient-to-r from-blue-500/10 to-transparent text-blue-400 border-l-2 border-blue-500 font-semibold' : 'text-slate-400 hover:bg-slate-900/40 hover:text-white'" class="w-full flex items-center space-x-3 px-4 py-2.5 rounded-xl transition-all">
                        <i class="fa-solid fa-chart-line text-xs"></i><span class="text-xs">Dashboard Arus Kas</span>
                    </button>
                    
                    <button @click="currentTab = 'pegawai'" :class="currentTab === 'pegawai' ? 'bg-gradient-to-r from-blue-500/10 to-transparent text-blue-400 border-l-2 border-blue-500 font-semibold' : 'text-slate-400 hover:bg-slate-900/40 hover:text-white'" class="w-full flex items-center space-x-3 px-4 py-2.5 rounded-xl transition-all">
                        <i class="fa-solid fa-users text-xs"></i><span class="text-xs">Kelola Pegawai (Staff)</span>
                    </button>
                    
                    <button @click="currentTab = 'gudang'" :class="currentTab === 'gudang' ? 'bg-gradient-to-r from-blue-500/10 to-transparent text-blue-400 border-l-2 border-blue-500 font-semibold' : 'text-slate-400 hover:bg-slate-900/40 hover:text-white'" class="w-full flex items-center space-x-3 px-4 py-2.5 rounded-xl transition-all">
                        <i class="fa-solid fa-warehouse text-xs"></i><span class="text-xs">Gudang Bahan Pangan</span>
                    </button>

                    <p class="text-[9px] font-bold text-slate-600 uppercase tracking-widest px-4 pt-4 mb-2">SYSTEM UTILITY</p>
                    <button @click="currentTab = 'system'" :class="currentTab === 'system' ? 'bg-gradient-to-r from-blue-500/10 to-transparent text-blue-400 border-l-2 border-blue-500 font-semibold' : 'text-slate-400 hover:bg-slate-900/40 hover:text-white'" class="w-full flex items-center space-x-3 px-4 py-2.5 rounded-xl transition-all">
                        <i class="fa-solid fa-database text-xs"></i><span class="text-xs">Database System</span>
                    </button>
                </nav>

                <!-- USER IDENTIFICATION -->
                <div class="p-4 border-t border-slate-900 bg-slate-950/80 space-y-2">
                    <div class="flex items-center space-x-3 bg-slate-900/50 p-3 rounded-xl border border-slate-800/50">
                        <div class="w-8 h-8 rounded-xl flex items-center justify-center" :class="currentUser.role === 'admin' ? 'bg-blue-500/10 text-blue-400' : 'bg-amber-500/10 text-brand-gold'">
                            <i class="fa-solid fa-user-tie text-xs"></i>
                        </div>
                        <div class="truncate">
                            <p class="text-xs font-bold text-slate-200" x-text="currentUser.name"></p>
                            <p class="text-[8px] font-bold uppercase tracking-widest" :class="currentUser.role === 'admin' ? 'text-blue-400' : 'text-brand-gold'" x-text="currentUser.role"></p>
                        </div>
                    </div>
                    <button @click="handleLogout()" class="w-full bg-slate-900 hover:bg-rose-950/30 hover:text-rose-400 text-slate-400 border border-slate-800/80 rounded-xl py-2 text-xs font-bold transition-all">
                        <i class="fa-solid fa-right-from-bracket mr-1.5"></i> Keluar Sistem
                    </button>
                </div>
            </aside>

            <!-- WORKSPACE PLATFORM -->
            <div class="flex-1 flex flex-col overflow-y-auto bg-slate-950">
                
                <!-- SECURE TOP BAR -->
                <header class="bg-slate-950/40 border-b border-slate-900 backdrop-blur-md px-8 py-4 flex justify-between items-center shrink-0">
                    <div class="flex items-center gap-3">
                        <span class="text-[9px] bg-slate-900 text-slate-400 px-3 py-1.5 rounded-lg border border-slate-800 font-bold tracking-wider flex items-center">
                            <span class="w-2 h-2 rounded-full bg-blue-500 animate-ping mr-2"></span> DATA SECURITY INTEGRITY ACTIVE
                        </span>
                        <template x-if="currentUser.role === 'auditor'">
                            <span class="text-[9px] bg-amber-500/10 text-brand-gold px-3 py-1.5 rounded-lg border border-brand-gold/20 font-bold uppercase">
                                <i class="fa-solid fa-eye-slash mr-1"></i> MODE AUDITOR: HANYA BACA
                            </span>
                        </template>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span class="text-xs font-bold text-emerald-400 bg-emerald-500/5 px-3 py-2 rounded-lg border border-emerald-500/15">
                            KAS AKTIF YAYASAN: <span x-text="formatRupiah(paguTotal)"></span>
                        </span>
                    </div>
                </header>

                <main class="p-8 space-y-8 max-w-7xl mx-auto w-full">
                    
                    <!-- ================= TAB: DASHBOARD ================= -->
                    <template x-if="currentTab === 'dashboard'">
                        <div class="space-y-8">
                            <!-- METRIC CARDS -->
                            <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div class="glass-panel p-6 rounded-2xl border-l-4 border-l-blue-500 shadow-md">
                                    <p class="text-[9px] font-bold tracking-wider text-slate-500 uppercase">Modal Kas Aktif</p>
                                    <p class="text-xl font-black text-white mt-1" x-text="formatRupiah(paguTotal)"></p>
                                </div>
                                <div class="glass-panel p-6 rounded-2xl border-l-4 border-l-emerald-500 shadow-md">
                                    <p class="text-[9px] font-bold tracking-wider text-slate-500 uppercase">Estimasi Belanja Logistik</p>
                                    <p class="text-xl font-black text-emerald-400 mt-1" x-text="formatRupiah(hitungTotalBelanjaLogistik())"></p>
                                </div>
                                <div class="glass-panel p-6 rounded-2xl border-l-4 border-l-brand-gold shadow-md">
                                    <p class="text-[9px] font-bold tracking-wider text-slate-500 uppercase">Total Gaji Pokok Pegawai</p>
                                    <p class="text-xl font-black mt-1 text-brand-gold" x-text="formatRupiah(hitungTotalGajiPegawai())"></p>
                                </div>
                            </section>

                            <!-- CORE INPUT & LOGS -->
                            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                <!-- CATAT BELANJA/KLAIM LOGISTIK -->
                                <div class="glass-panel p-6 rounded-2xl shadow-xl border border-slate-800">
                                    <h3 class="text-xs font-bold uppercase tracking-wider text-white mb-4 border-b border-slate-800 pb-3 flex items-center">
                                        <i class="fa-solid fa-cart-shopping text-blue-500 mr-2"></i>Catat Belanja Logistik
                                    </h3>
                                    <template x-if="currentUser.role === 'auditor'">
                                        <div class="p-4 bg-amber-500/10 border border-amber-500/20 rounded-xl text-xs text-brand-gold">
                                            <i class="fa-solid fa-ban mr-1.5"></i> <strong>Akses Terkunci:</strong> Auditor dilarang mengubah transaksi.
                                        </div>
                                    </template>
                                    <template x-if="currentUser.role === 'admin'">
                                        <form @submit.prevent="tambahTransaksiLogistik()" class="space-y-4">
                                            <div>
                                                <label class="block text-[9px] font-bold text-slate-400 uppercase mb-1">Tipe Aksi</label>
                                                <select x-model="logistikForm.jenis" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-xs text-white outline-none">
                                                    <option value="pengeluaran">📥 Belanja Bahan Baku (Pengeluaran)</option>
                                                    <option value="pemasukan">📤 Klaim Logistik Masuk (Pemasukan)</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label class="block text-[9px] font-bold text-slate-400 uppercase mb-1">Bahan Makanan</label>
                                                <select x-model="logistikForm.namaBahan" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-xs text-white outline-none" required>
                                                    <option value="">-- Pilih Bahan Makanan --</option>
                                                    <template x-for="stok in daftarStokGudang" :key="stok.id">
                                                        <option :value="stok.bahan" x-text="stok.bahan + ' (Stok: ' + stok.qty + ' ' + stok.satuan + ')'"></option>
                                                    </template>
                                                </select>
                                            </div>
                                            <div class="grid grid-cols-2 gap-3">
                                                <div>
                                                    <label class="block text-[9px] font-bold text-slate-400 uppercase mb-1">Jumlah (Qty)</label>
                                                    <input type="number" x-model.number="logistikForm.qty" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-xs text-white outline-none" required min="1">
                                                </div>
                                                <div>
                                                    <label class="block text-[9px] font-bold text-slate-400 uppercase mb-1">Harga Satuan (IDR)</label>
                                                    <input type="number" x-model.number="logistikForm.harga" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-xs text-white outline-none" required min="100">
                                                </div>
                                            </div>
                                            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl text-[10px] uppercase tracking-wider transition-all">
                                                Simpan Transaksi
                                            </button>
                                        </form>
                                    </template>
                                </div>

                                <!-- JOURNAL DATA TABLE -->
                                <div class="lg:col-span-2 space-y-6">
                                    <div class="glass-panel rounded-2xl overflow-hidden border border-slate-800 shadow-xl">
                                        <div class="p-5 border-b border-slate-800 flex justify-between items-center bg-slate-950/20">
                                            <div>
                                                <h3 class="text-xs font-bold text-white uppercase tracking-wider">Histori Jurnal Transaksi</h3>
                                                <p class="text-[9px] text-slate-500 font-mono">Arus Logistik & Finansial Yayasan</p>
                                            </div>
                                        </div>
                                        <div class="overflow-x-auto max-h-96">
                                            <table class="w-full text-left text-xs">
                                                <thead class="bg-slate-900/60 text-[9px] text-slate-500 uppercase font-bold tracking-wider">
                                                    <tr>
                                                        <th class="p-3">Tanggal / Kode Hash</th>
                                                        <th class="p-3">Logistik</th>
                                                        <th class="p-3 text-center">Tipe</th>
                                                        <th class="p-3 text-right">Volume</th>
                                                        <th class="p-3 text-right">Subtotal</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <template x-for="(item, idx) in transaksiHistori" :key="idx">
                                                        <tr class="border-b border-slate-900/40 hover:bg-slate-900/20">
                                                            <td class="p-3 text-[10px] space-y-0.5">
                                                                <p class="text-slate-400 font-mono" x-text="item.tanggal"></p>
                                                                <p class="text-[8px] text-slate-500 font-mono truncate max-w-[120px]" x-text="'HASH:' + item.hash"></p>
                                                            </td>
                                                            <td class="p-3 font-bold text-white" x-text="item.namaBahan"></td>
                                                            <td class="p-3 text-center">
                                                                <span :class="item.jenis === 'pengeluaran' ? 'bg-rose-500/10 text-rose-400 border-rose-500/20' : 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20'" class="px-2 py-0.5 rounded text-[8px] font-bold border" x-text="item.jenis === 'pengeluaran' ? 'PENGELUARAN' : 'PEMASUKAN'"></span>
                                                            </td>
                                                            <td class="p-3 text-right font-medium text-slate-300" x-text="item.qty + ' unit'"></td>
                                                            <td class="p-3 text-right font-bold" :class="item.jenis === 'pengeluaran' ? 'text-rose-400' : 'text-emerald-400'" x-text="formatRupiah(item.qty * item.harga)"></td>
                                                        </tr>
                                                    </template>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>

                    <!-- ================= TAB: KELOLA PEGAWAI (NEW) ================= -->
                    <template x-if="currentTab === 'pegawai'">
                        <div class="space-y-6">
                            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                <!-- INPUT & EDIT PEGAWAI -->
                                <div class="glass-panel p-6 rounded-2xl shadow-xl border border-slate-800">
                                    <h3 class="text-xs font-bold text-white uppercase mb-4 border-b border-slate-800 pb-3">
                                        <span x-text="isEditPegawai ? '✏️ Edit Data Pegawai' : '➕ Registrasi Pegawai Baru'"></span>
                                    </h3>
                                    <template x-if="currentUser.role === 'auditor'">
                                        <div class="p-4 bg-amber-500/10 border border-amber-500/20 rounded-xl text-xs text-brand-gold">
                                            <i class="fa-solid fa-ban mr-1.5"></i> Hak Akses Terkunci untuk Auditor.
                                        </div>
                                    </template>
                                    <template x-if="currentUser.role === 'admin'">
                                        <form @submit.prevent="simpanPegawai()" class="space-y-4">
                                            <div>
                                                <label class="block text-[9px] font-bold text-slate-400 uppercase mb-1">Nama Pegawai</label>
                                                <input type="text" x-model="pegawaiForm.nama" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-xs text-white outline-none" required>
                                            </div>
                                            <div>
                                                <label class="block text-[9px] font-bold text-slate-400 uppercase mb-1">Jabatan / Peran</label>
                                                <input type="text" x-model="pegawaiForm.jabatan" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-xs text-white outline-none" placeholder="Contoh: Manajer Operasional, Staff Dapur" required>
                                            </div>
                                            <div>
                                                <label class="block text-[9px] font-bold text-slate-400 uppercase mb-1">Gaji Pokok bulanan (IDR)</label>
                                                <input type="number" x-model.number="pegawaiForm.gaji" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-xs text-white outline-none" required min="100000">
                                            </div>
                                            <div>
                                                <label class="block text-[9px] font-bold text-slate-400 uppercase mb-1">Status Kepegawaian</label>
                                                <select x-model="pegawaiForm.status" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-xs text-white outline-none">
                                                    <option value="Aktif">Aktif</option>
                                                    <option value="Cuti">Cuti Kerja</option>
                                                    <option value="Suspended">Dinonaktifkan Sementara</option>
                                                </select>
                                            </div>

    <!-- ALPINE ENGINE SCRIPT -->
    <script>
        function yayasanApp() {
            return {
                // AUTH DATA
                isLoggedIn: false,
                loginStep: 1,
                lockoutTime: 0,
                failedAttempts: 0,
                generatedOTP: '000000',
                loginForm: { username: '', password: '', otp: '' },
                currentUser: { name: '', role: '' },
                toasts: [],
                currentTab: 'dashboard',

                // CORE GLOBAL STATE
                paguTotal: 250000000, // IDR 250 Juta
                transaksiHistori: [],

                // PEGAWAI DATA
                daftarPegawai: [],
                pegawaiForm: { id: null, nama: '', jabatan: '', gaji: 0, status: 'Aktif' },
                isEditPegawai: false,

                // GUDANG FOOD MATERIALS DATA
                daftarStokGudang: [],
                gudangForm: { id: null, bahan: '', qty: 0, satuan: 'Kg', rak: '' },
                isEditBahan: false,

                // TRANSACTION FORM
                logistikForm: { jenis: 'pengeluaran', namaBahan: '', qty: 1, harga: 15000 },

                initApp() {
                    // LOAD DATA FROM STORAGE OR INITIALIZE
                    if (localStorage.getItem('yy_session')) {
                        const sess = JSON.parse(localStorage.getItem('yy_session'));
                        this.currentUser = sess;
                        this.isLoggedIn = true;
                    }

                    this.loadDatabase();
                },

                loadDatabase() {
                    // INITIAL DEFAULT PEGAWAI
                    const defaultPegawai = [
                        { id: 101, nama: 'Budi Hartono', jabatan: 'Manajer Gudang', gaji: 4500000, status: 'Aktif' },
                        { id: 102, nama: 'Siti Aminah', jabatan: 'Staff Dapur Utama', gaji: 3200000, status: 'Aktif' },
                        { id: 103, nama: 'Agus Santoso', jabatan: 'Kurir Pengirim', gaji: 3000000, status: 'Cuti' }
                    ];

                    // INITIAL DEFAULT GUDANG (BAHAN MAKANAN)
                    const defaultGudang = [
                        { id: 501, bahan: 'Beras Premium', qty: 150, satuan: 'Kg', rak: 'Rak A-1' },
                        { id: 502, bahan: 'Minyak Kelapa', qty: 45, satuan: 'Liter', rak: 'Rak B-2' },
                        { id: 503, bahan: 'Daging Sapi Frozen', qty: 20, satuan: 'Kg', rak: 'Freezer Box 1' },
                        { id: 504, bahan: 'Telur Ayam', qty: 30, satuan: 'Kg', rak: 'Rak C-3' }
                    ];

                    const defaultHistori = [
                        { tanggal: '2026-07-15 10:14', hash: '8f00a29bd45', namaBahan: 'Beras Premium', jenis: 'pengeluaran', qty: 50, harga: 14000 },
                        { tanggal: '2026-07-16 14:22', hash: '1a2b3c4d5e6', namaBahan: 'Telur Ayam', jenis: 'pemasukan', qty: 20, harga: 28000 }
                    ];

                    this.daftarPegawai = localStorage.getItem('yy_pegawai') ? JSON.parse(localStorage.getItem('yy_pegawai')) : defaultPegawai;
                    this.daftarStokGudang = localStorage.getItem('yy_gudang') ? JSON.parse(localStorage.getItem('yy_gudang')) : defaultGudang;
                    this.transaksiHistori = localStorage.getItem('yy_histori') ? JSON.parse(localStorage.getItem('yy_histori')) : defaultHistori;
                    this.paguTotal = localStorage.getItem('yy_pagu') ? Number(localStorage.getItem('yy_pagu')) : 250000000;
                },

                saveToStorage() {
                    localStorage.setItem('yy_pegawai', JSON.stringify(this.daftarPegawai));
                    localStorage.setItem('yy_gudang', JSON.stringify(this.daftarStokGudang));
                    localStorage.setItem('yy_histori', JSON.stringify(this.transaksiHistori));
                    localStorage.setItem('yy_pagu', this.paguTotal.toString());
                },

                // AUTH LOGIC
                submitPassword() {
                    const u = this.loginForm.username.trim();
                    const p = this.loginForm.password.trim();

                    if ((u === 'admin' && p === 'admin123') || (u === 'auditor' && p === 'auditor123')) {
                        this.currentUser = {
                            name: u === 'admin' ? 'Super Administrator' : 'BPK Special Auditor',
                            role: u === 'admin' ? 'admin' : 'auditor'
                        };
                        this.generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
                        this.loginStep = 2;
                        this.pushToast("Otentikasi Kunci Tahap 1 Berhasil! Masukkan Kode OTP.");
                    } else {
                        this.failedAttempts++;
                        this.pushToast("Sandi/Username Enkripsi Salah!");
                        if (this.failedAttempts >= 3) {
                            this.lockoutTime = 30;
                            const countdown = setInterval(() => {
                                this.lockoutTime--;
                                if (this.lockoutTime <= 0) {
                                    clearInterval(countdown);
                                    this.failedAttempts = 0;
                                }
                            }, 1000);
                        }
                    }
                },

                submitOTP() {
                    if (this.loginForm.otp === this.generatedOTP || this.loginForm.otp === '666999') {
                        this.isLoggedIn = true;
                        localStorage.setItem('yy_session', JSON.stringify(this.currentUser));
                        this.pushToast("Selamat Datang kembali, Agen Otoritatif.");
                    } else {
                        this.pushToast("Kode OTP Tidak Valid!");
                    }
                },

                handleLogout() {
                    this.isLoggedIn = false;
                    this.loginStep = 1;
                    this.loginForm = { username: '', password: '', otp: '' };
                    localStorage.removeItem('yy_session');
                    this.pushToast("Sesi Dihentikan Secara Aman.");
                },

                // TOAST ENGINE
                pushToast(msg) {
                    const id = Date.now();
                    this.toasts.push({ id, message: msg });
                    setTimeout(() => {
                        this.toasts = this.toasts.filter(t => t.id !== id);
                    }, 4000);
                },

                // FINANCIAL RECAPS
                hitungTotalBelanjaLogistik() {
                    return this.transaksiHistori
                        .filter(i => i.jenis === 'pengeluaran')
                        .reduce((acc, curr) => acc + (curr.qty * curr.harga), 0);
                },

                hitungTotalGajiPegawai() {
                    return this.daftarPegawai
                        .filter(p => p.status === 'Aktif')
                        .reduce((acc, curr) => acc + curr.gaji, 0);
                },

                // PEGAWAI CRUD
                simpanPegawai() {
                    if (this.isEditPegawai) {
                        // UPDATE PEGAWAI
                        this.daftarPegawai = this.daftarPegawai.map(p => {
                            if (p.id === this.pegawaiForm.id) {
                                return { ...this.pegawaiForm };
                            }
                            return p;
                        });
                        this.pushToast("Data Pegawai (" + this.pegawaiForm.nama + ") berhasil diperbarui!");
                        this.batalEditPegawai();
                    } else {
                        // ADD NEW PEGAWAI
                        const newId = Date.now() % 1000;
                        const newPegawai = {
                            id: newId,
                            nama: this.pegawaiForm.nama,
                            jabatan: this.pegawaiForm.jabatan,
                            gaji: this.pegawaiForm.gaji,
                            status: this.pegawaiForm.status
                        };
                        this.daftarPegawai.push(newPegawai);
                        this.pushToast("Pegawai Baru (" + newPegawai.nama + ") berhasil didaftarkan!");
                    }
                    this.saveToStorage();
                    this.resetPegawaiForm();
                },

                persiapkanEditPegawai(pegawai) {
                    this.isEditPegawai = true;
                    this.pegawaiForm = { ...pegawai };
                },

                batalEditPegawai() {
                    this.isEditPegawai = false;
                    this.resetPegawaiForm();
                },

                resetPegawaiForm() {
                    this.pegawaiForm = { id: null, nama: '', jabatan: '', gaji: 0, status: 'Aktif' };
                },

                hapusPegawai(id) {
                    this.daftarPegawai = this.daftarPegawai.filter(p => p.id !== id);
                    this.saveToStorage();
                    this.pushToast("Pegawai diberhentikan dari database.");
                },

                // GUDANG CRUD
                simpanBahanGudang() {
                    if (this.isEditBahan) {
                        // UPDATE STOK
                        this.daftarStokGudang = this.daftarStokGudang.map(stok => {
                            if (stok.id === this.gudangForm.id) {
                                return { ...this.gudangForm };
                            }
                            return stok;
                        });
                        this.pushToast("Stok " + this.gudangForm.bahan + " diperbarui!");
                        this.batalEditBahan();
                    } else {
                        // ADD NEW FOOD ITEM
                        const newId = Date.now() % 1000;
                        const newBahan = {
                            id: newId,
                            bahan: this.gudangForm.bahan,
                            qty: this.gudangForm.qty,
                            satuan: this.gudangForm.satuan,
                            rak: this.gudangForm.rak
                        };
                        this.daftarStokGudang.push(newBahan);
                        this.pushToast("Jenis Logistik Makanan baru berhasil ditambahkan!");
                    }
                    this.saveToStorage();
                    this.resetGudangForm();
                },

                persiapkanEditBahan(stok) {
                    this.isEditBahan = true;
                    this.gudangForm = { ...stok };
                },

                batalEditBahan() {
                    this.isEditBahan = false;
                    this.resetGudangForm();
                },

                resetGudangForm() {
                    this.gudangForm = { id: null, bahan: '', qty: 0, satuan: 'Kg', rak: '' };
                },

                hapusBahanGudang(id) {
                    this.daftarStokGudang = this.daftarStokGudang.filter(stok => stok.id !== id);
                    this.saveToStorage();
                    this.pushToast("Bahan Makanan dihapus dari inventaris.");
                },

                // LOGISTIK TRANSACTION HANDLER
                tambahTransaksiLogistik() {
                    if (!this.logistikForm.namaBahan) {
                        this.pushToast("Pilih bahan makanan terlebih dahulu!");
                        return;
                    }

                    const tglNow = new Date().toISOString().slice(0, 16).replace('T', ' ');
                    const randomHash = Math.random().toString(16).substring(2, 13);
                    const subtotal = this.logistikForm.qty * this.logistikForm.harga;

                    // Update Kas Aktif Yayasan
                    if (this.logistikForm.jenis === 'pengeluaran') {
                        if (this.paguTotal < subtotal) {
                            this.pushToast("❌ Sesi Belanja Ditolak: Kas Yayasan Tidak Mencukupi!");
                            return;
                        }
                        this.paguTotal -= subtotal;
                    } else {
                        this.paguTotal += subtotal;
                    }

                    // Update Riil Stok Gudang
                    this.daftarStokGudang = this.daftarStokGudang.map(stok => {
                        if (stok.bahan === this.logistikForm.namaBahan) {
                            if (this.logistikForm.jenis === 'pengeluaran') {
                                stok.qty += this.logistikForm.qty; // Belanja berarti menambah stok gudang
                            } else {
                                stok.qty = Math.max(0, stok.qty - this.logistikForm.qty); // Klaim keluar berarti memotong stok gudang
                            }
                        }
                        return stok;
                    });

                    // Input ke Jurnal
                    this.transaksiHistori.unshift({
                        tanggal: tglNow,
                        hash: randomHash,
                        namaBahan: this.logistikForm.namaBahan,
                        jenis: this.logistikForm.jenis,
                        qty: this.logistikForm.qty,
                        harga: this.logistikForm.harga
                    });

                    this.saveToStorage();
                    this.pushToast("Sukses mencatat transaksi logistik!");
                    this.logistikForm = { jenis: 'pengeluaran', namaBahan: '', qty: 1, harga: 15000 };
                },

                // UTILITIES
                formatRupiah(value) {
                    return new Intl.NumberFormat('id-ID', {
                        style: 'currency',
                        currency: 'IDR',
                        minimumFractionDigits: 0
                    }).format(value);
                },

                resetDataPabrik() {
                    if (confirm("⚠️ Apakah Anda yakin ingin memformat sistem database kembali ke default awal?")) {
                        localStorage.clear();
                        this.loadDatabase();
                        this.pushToast("Semua database telah diformat!");
                    }
                }
            }
        }
    </script>
</body>
</html>
